[build]
  base = "trading-terminal"
  publish = "out"
  # Next's `output: export` cannot include the app-router API route (it has no
  # generateStaticParams and proxies live data) — Netlify serves that same
  # path via the sofa-proxy function + redirect below instead, so the route
  # is only needed for local `next dev`. Strip it before the static build.
  command = "rm -rf src/app/api && npm run build"

[build.environment]
  NODE_VERSION = "20"

# Functions directory for serverless functions (SofaScore proxy etc.)
[functions]
  directory = "netlify/functions"

# Route SofaScore API requests through the serverless function
[[redirects]]
  from = "/api/sofa/*"
  to = "/.netlify/functions/sofa-proxy/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
